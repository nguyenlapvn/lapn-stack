# LapN — server-wide default values.
# This file lives in the repo (DO NOT edit directly in production).
# Override via /etc/lapn/config (generated during install).

# --- Paths ---
LAPN_ETC="/etc/lapn"
LAPN_STATE="/etc/lapn/sites.json"
LAPN_CONFIG="/etc/lapn/config"
LAPN_SECRETS="/etc/lapn/secrets"
LAPN_LOG_DIR="/var/log/lapn"
LAPN_LOG="/var/log/lapn/actions.log"
LAPN_SITES_HOME="/home/sites"
LAPN_TRASH="/root/lapn-trash"

# --- Internal ports (bind 127.0.0.1) ---
LAPN_PORT_MIN=3001
LAPN_PORT_MAX=3999

# --- SSH ---
# The actual ssh_port is stored in /etc/lapn/config; this is only a fallback when not yet set.
LAPN_SSH_PORT_DEFAULT=22

# --- Default resource limits for the systemd unit (override per-site) ---
LAPN_MEMORY_MAX="512M"
LAPN_CPU_QUOTA="80%"

# --- Nginx ---
LAPN_CLIENT_MAX_BODY="10m"

# --- journald cap ---
LAPN_JOURNALD_MAX_USE="500M"

# --- Current state schema version ---
LAPN_SCHEMA_VERSION=1

# --- Default Node version when creating a site (LTS) ---
LAPN_NODE_DEFAULT="20"
