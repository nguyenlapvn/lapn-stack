# LapN — giá trị mặc định toàn server.
# File này nằm trong repo (KHÔNG sửa trực tiếp ở production).
# Override bằng /etc/lapn/config (sinh khi install).

# --- Đường dẫn ---
LAPN_ETC="/etc/lapn"
LAPN_STATE="/etc/lapn/sites.json"
LAPN_CONFIG="/etc/lapn/config"
LAPN_SECRETS="/etc/lapn/secrets"
LAPN_LOG_DIR="/var/log/lapn"
LAPN_LOG="/var/log/lapn/actions.log"
LAPN_SITES_HOME="/home/sites"
LAPN_TRASH="/root/lapn-trash"

# --- Port nội bộ (bind 127.0.0.1) ---
LAPN_PORT_MIN=3001
LAPN_PORT_MAX=3999

# --- SSH ---
# ssh_port thực tế lưu ở /etc/lapn/config; đây chỉ là fallback khi chưa có.
LAPN_SSH_PORT_DEFAULT=22

# --- Giới hạn tài nguyên mặc định cho systemd unit (override per-site) ---
LAPN_MEMORY_MAX="512M"
LAPN_CPU_QUOTA="80%"

# --- Nginx ---
LAPN_CLIENT_MAX_BODY="10m"

# --- journald cap ---
LAPN_JOURNALD_MAX_USE="500M"

# --- Phiên bản schema state hiện tại ---
LAPN_SCHEMA_VERSION=1

# --- Node mặc định khi tạo site (LTS) ---
LAPN_NODE_DEFAULT="20"
